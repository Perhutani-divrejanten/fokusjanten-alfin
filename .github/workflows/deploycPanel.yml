name: Deploy ke cPanel

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 */6 * * *'   # otomatis update setiap 6 jam

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./
          server-dir: /public_html/    # sesuaikan dengan folder tujuan di cPanel
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
